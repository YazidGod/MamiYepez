<div class="container">
  <h1 id="Titulo" class="mb-0 text-center">Clases Actuales</h1>
  <br><br>

  <div class="row g-3 mt-2">
    @for (clase of clases; track $index) {
      <div class="col-12 col-sm-6 col-lg-4">
        <div class="card h-100">
          <div class="card-body">
            <div class="d-flex flex-row align-items-center text-center gap-2">
              <img class="img-frame img-fluid mb-3" [src]="clase.img" alt="{{ clase.nombre }}">
              <div>
                <h5 class="card-title">{{ clase.nombre }}</h5>
                <p class="card-text">{{ clase.descripcion }}</p>
                <p class="card-text"><small class="text-muted">{{ clase.dia }}</small></p>
                <p class="card-text"><small class="text-muted">{{ clase.hora }} p.m.</small></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</div>
