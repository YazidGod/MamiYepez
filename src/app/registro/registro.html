        <input type="text" name="nombre" required />

      </div>

        <input type="email" name="email" required />

        <input type="password" name="contraseña" required />

      </div>
      <div class="user-box">
        <input type="password" name="confirmar" required />

      </div>
      <a href="#">

        <span></span>
        <span></span>
        Registrarme
      </a>
    </form>
  </div>
